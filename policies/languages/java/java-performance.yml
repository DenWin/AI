# Java Performance Policies
# Keep rules token friendly, concise but precise and use RFC-2119 keywords.

policies:
  JAVA-PERF-001:
    title: "String Concatenation"
    rule: "String concatenation in loops **MUST** use StringBuilder or StringBuffer."
    
  JAVA-PERF-002:
    title: "Collection Sizing"
    rule: "Collections **SHOULD** be initialized with appropriate initial capacity when size is known."
    
  JAVA-PERF-003:
    title: "Resource Management"
    rule: "Resources **MUST** be properly closed using try-with-resources or finally blocks."
    
  JAVA-PERF-004:
    title: "Object Creation"
    rule: "Unnecessary object creation **SHOULD** be avoided in performance-critical code paths."